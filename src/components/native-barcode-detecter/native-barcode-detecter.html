<h2>Native Barcode Detection API</h2>
<form class="scan-section" (ngSubmit)="scan()">
  <mat-form-field appearance="outline" class="imei-field">
    <mat-label>IMEI</mat-label>
    <input
      matInput
      name="nativeImei"
      inputmode="numeric"
      autocomplete="off"
      maxlength="15"
      [ngModel]="imei"
      (ngModelChange)="updateImei($event)"
      (beforeinput)="allowOnlyImeiDigits($event)"
    />
    <button class="scan-btn" mat-flat-button matSuffix color="primary" type="submit" [disabled]="isScanning">
      Scan
    </button>
  </mat-form-field>
  <button class="clear-link" mat-button type="button" (click)="clear()">Clear</button>
</form>
<video
  #preview
  class="scanner-preview"
  [class.is-active]="isScanning"
  autoplay
  muted
  playsinline
></video>
<div class="result">
  <h3>Output</h3>
  <p>{{ output }}</p>
</div>
