<h2>Zxing ngx Scanner</h2>
<form class="scan-section" (ngSubmit)="scan()">
  <mat-form-field appearance="outline" class="imei-field">
    <mat-label>IMEI</mat-label>
    <input
      matInput
      name="zxingImei"
      inputmode="numeric"
      autocomplete="off"
      maxlength="15"
      [ngModel]="imei"
      (ngModelChange)="updateImei($event)"
      (beforeinput)="allowOnlyImeiDigits($event)"
    />
    <button class="scan-btn" mat-flat-button matSuffix color="primary" type="submit" [disabled]="isScanning">
      Scan
    </button>
  </mat-form-field>
  <button class="clear-link" mat-button type="button" (click)="clear()">Clear</button>
</form>
<zxing-scanner
  class="scanner-preview"
  [class.is-active]="isScanning"
  [enable]="isScanning"
  [formats]="barcodeFormats"
  [tryHarder]="true"
  [timeBetweenScans]="250"
  [delayBetweenScanSuccess]="500"
  previewFitMode="cover"
  (scanSuccess)="onScanSuccess($event)"
  (scanError)="onScanError($event)"
  (camerasNotFound)="onCamerasNotFound()"
  (permissionResponse)="onPermissionResponse($event)"
></zxing-scanner>
<div class="result">
  <h3>Output</h3>
  <p>{{ output }}</p>
</div>
